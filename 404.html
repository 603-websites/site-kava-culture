<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — The Spot Nashua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/jdkato/norwester@main/norwester.otf" as="font" type="font/otf" crossorigin/>
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Norwester', sans-serif;
      font-size: 8rem;
      color: var(--teal-primary, #89E3EB);
      line-height: 1;
      margin: 0;
    }

    .error-title {
      font-family: 'Norwester', sans-serif;
      font-size: 2rem;
      color: #fff;
      margin: 0.5rem 0;
    }

    .error-message {
      font-family: 'Roboto Condensed', sans-serif;
      color: #ccc;
      font-size: 1.1rem;
      margin: 1rem 0 2rem;
      max-width: 420px;
    }

    .error-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--teal-link, #42AFB9);
      color: #fff;
      font-family: 'Norwester', sans-serif;
      font-size: 1.1rem;
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .error-btn:hover {
      background: var(--teal-primary, #89E3EB);
      color: var(--teal-deep, #0F272E);
    }

    .error-header {
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .error-header a {
      font-family: 'Norwester', sans-serif;
      font-size: 1.5rem;
      color: var(--teal-primary, #89E3EB);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .error-footer {
      text-align: center;
      padding: 2rem;
      font-family: 'Roboto Condensed', sans-serif;
      color: #777;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header class="error-header">
    <a href="index.html">The Spot</a>
  </header>

  <main class="error-page">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-message">The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="error-btn">Back to Home</a>
  </main>

  <footer class="error-footer">
    &copy; 2025 The Spot Nashua. All rights reserved.
  </footer>

</body>
</html>
